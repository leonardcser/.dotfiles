providers:
  - name: zai
    type: openai-compatible
    api_base: https://api.z.ai/api/coding/paas/v4
    api_key_env: Z_AI_API_KEY
    models:
      - glm-4.7
  - name: box
    type: openai-compatible
    api_base: https://llm.box.home.arpa
    api_key_env: BOX_API_KEY
    models:
      - name: Qwen/Qwen3.5-122B
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        repeat_penalty: 1.0
      - name: Qwen/Qwen3.5-27B
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        min_p: 0.0
        repeat_penalty: 1.0
      - name: nvidia/nemotron-3-super
        temperature: 1.0
        top_p: 0.95
      - openai/gpt-oss-20b
  - name: iict
    type: openai-compatible
    api_base: https://k8s-ray.iict-heig-vd.in/v1
    models:
      - Qwen/Qwen3.5-27B
      - Qwen/Qwen3.5-122B-A10B-FP8
  - name: codex
    type: codex
    api_base: https://chatgpt.com/backend-api/codex

permissions:
  default:
    web_fetch:
      allow:
        - "*"
    tools:
      allow:
        - web_search
    mcp:
      allow:
        - nvim_lsp_read_lints
settings:
  multi_agent: true
mcp:
  nvim_lsp:
    type: local
    command:
      - /Users/leo/dev/mcp/nvim-lsp-mcp/nvim-lsp-mcp
