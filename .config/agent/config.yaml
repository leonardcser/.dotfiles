providers:
  - name: zai
    type: openai-compatible
    api_base: https://api.z.ai/api/coding/paas/v4
    api_key_env: Z_AI_API_KEY
    models:
      - glm-4.7
  - name: box
    type: openai-compatible
    api_base: https://llm.box.home.arpa
    api_key_env: BOX_API_KEY
    models:
      - Qwen3.5-122B-A10B-Q4_0
      - Qwen3.5-27B-Q8_0
      - gpt-oss-120b-Q8_0
      - gpt-oss-20b-Q8_0

permissions:
  normal:
    web_fetch:
      allow: ["*"]
    web_search:
      allow: ["*"]
