# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf; display "Config reloaded"

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-overrides ",xterm-256color:Ms=\\E]52;c%p1%.0s;%p2%s\\7"
set -g set-clipboard on
set -g mouse on
# Prevent shell from remaining windows after setting it once
set -g allow-rename off
# Allow OSC 52 escape sequences to pass through (for clipboard over SSH)
set -g allow-passthrough on

# Forward bells from ALL panes to iTerm2 (not just the active one)
set -g bell-action any

# Enable bell monitoring
set -g monitor-bell on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Pane border
set -g pane-border-style fg=white
set -g pane-active-border-style fg=cyan

# Status bar  
set -g status-style bg=black,fg=cyan
set -g window-status-style fg=green,bold
set -g status-left-length 30

# Keymaps
# New window after current (not at end)
bind c new-window -a
# New window at the end of the session
bind C new-window

# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Show keymaps
bind ? list-keys

# Move window to index (insert and shift)
bind . command-prompt -p "Move window to:" "run-shell 'C=#{window_index}; T=%%; if [ \$T -gt \$C ]; then tmux move-window -a -t \$T; elif [ \$T -lt \$C ]; then tmux move-window -b -t \$T; fi'"

# Sessionizer
bind f run-shell "tmux neww ~/.local/bin/scripts/tmux-sessionizer"
bind S command-prompt -p "New Session:" "new-session -A -s '%%'"
bind K run-shell 'if [ $(tmux list-sessions | wc -l) -gt 1 ]; then recent=$(tmux list-sessions -F "#{session_last_attached} #{session_name}" | grep -v "#S" | sort -nr | head -1 | cut -d" " -f2); tmux switch-client -t "$recent"; tmux kill-session -t "#S"; else tmux kill-session -t "#S"; fi'

# Agent sessions browser
bind j run-shell "tmux neww agent-mux"
run-shell -b "agent-mux watch"

# Open first URL in current pane
bind u run-shell '
url=$(tmux capture-pane -t . -p | grep -oE "https?://[^[:space:])]*" | tail -1)
if [ -n "$url" ]; then
    if command -v open >/dev/null 2>&1; then
        open "$url"
    elif command -v xdg-open >/dev/null 2>&1; then
        xdg-open "$url"
    else
        tmux set-buffer "$url"
        tmux display-message "Copied: $url"
    fi
fi
'

# Pane resize bindings - using C-A C-hjkl instead of Meta keys
bind C-h resize-pane -L 5
bind C-j resize-pane -D 5
bind C-k resize-pane -U 5
bind C-l resize-pane -R 5

# Enable vi mode for copy mode
set-window-option -g mode-keys vi

# Scroll 2 lines at a time instead of 5
bind -T copy-mode-vi WheelUpPane send-keys -N 2 -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -N 2 -X scroll-down

# Auto-save sessions for restoration after reboot
set-hook -g session-created 'run-shell "~/.local/bin/scripts/tmux-save"'
set-hook -g session-closed 'run-shell "~/.local/bin/scripts/tmux-save"'

# Bindings for copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X begin-selection \; send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
